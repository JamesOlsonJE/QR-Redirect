<!DOCTYPE html>
<html>
<head>
  <script>
    const params = new URLSearchParams(window.location.search);
    const unit = (params.get("unit") || "").toUpperCase().trim();

    fetch("https://janneyelectric.sharepoint.com/sites/JanneyElectric/Shared%20Documents/Fleet_WR_Routing_JSON/routing.json?t=" + Date.now())
      .then(res => res.json())
      .then(data => {
        const row = data.find(r => (r.Unit_ID || "").toUpperCase().trim() === unit);

        if (!row) {
          document.body.innerText = "Unit not found";
          return;
        }

        if ((row.Vehicle_Status || "").toUpperCase().trim() === "ACTIVE") {
          window.location.href = row.Active_URL;
        } else {
          window.location.href = row.Inactive_URL;
        }
      });
  </script>
</head>

</html>

<!DOCTYPE html>
<html>
<head>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const params = new URLSearchParams(window.location.search);
      const unit = (params.get("unit") || "").toUpperCase().trim();

      document.body.innerText = "START | unit=" + unit;

      try {
        const res = await fetch("https://janneyelectric.sharepoint.com/sites/JanneyElectric/Shared%20Documents/Fleet_WR_Routing_JSON/routing.json?t=" + Date.now());
        const text = await res.text();

        document.body.innerText =
          "FETCH OK\n\n" +
          text.substring(0, 1000);
      } catch (err) {
        document.body.innerText = "FETCH ERROR\n\n" + err;
      }
    });
  </script>
</head>

</body>
</html>

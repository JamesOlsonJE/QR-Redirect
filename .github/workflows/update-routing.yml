name: Update routing.json

on:
  schedule:
    - cron: "*/2 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Test SharePoint link
        run: |
          curl -L "https://janneyelectric.sharepoint.com/:u:/s/JanneyElectric/IQAVIVqqElDPTISsboDRWG-RAcXayHSjqukwrsJIXws9DAY" -o test_output.txt
          echo "----- START -----"
          head -n 20 test_output.txt
          echo "----- END -----"

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add routing.json
          git diff --cached --quiet || git commit -m "Update routing.json"
          git push
